<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 650px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
        }

        .entrada {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .entrada input {
            flex: 1;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .entrada button, #btn-ordenar {
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #4a90e2;
            color: white;
        }

        .entrada button:hover, #btn-ordenar:hover {
            background: #357abd;
        }

        #btn-ordenar {
            display: block;
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            background: #27ae60;
        }

        #btn-ordenar:hover {
            background: #1e8449;
        }

        #lista-numeros {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
            min-height: 36px;
        }

        .numero-tag {
            background: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .numero-tag span {
            cursor: pointer;
            color: #e74c3c;
            font-weight: bold;
        }

        .container {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-top: 24px;
        }

        .bloco h2 {
            margin-bottom: 8px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f0f0f0;
            margin: 4px 0;
            padding: 6px 12px;
            border-radius: 4px;
        }

        #mensagem-erro {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 4px;
            min-height: 18px;
        }
    </style>
</head>
<body>
    <h1>Bubble Sort</h1>

    <div class="entrada">
        <input type="number" id="input-numero" placeholder="Digite um número" />
        <button onclick="adicionarNumero()">Adicionar</button>
    </div>
    <div id="mensagem-erro"></div>
    <div id="lista-numeros"></div>

    <button id="btn-ordenar" onclick="ordenar()">Ordenar</button>

    <div class="container" id="resultado" style="display:none">
        <div class="bloco">
            <h2>Vetor Original</h2>
            <ul id="vetor-original"></ul>
        </div>
        <div class="bloco">
            <h2>Vetor Ordenado</h2>
            <ul id="vetor-ordenado"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
